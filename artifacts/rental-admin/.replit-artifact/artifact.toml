kind = "web"
previewPath = "/"
title = "Shop Rental Manager"
version = "1.0.0"
id = "artifacts/rental-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22114

[services.development]
run = "pnpm --filter @workspace/rental-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rental-admin", "run", "build" ]
publicDir = "artifacts/rental-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22114"
BASE_PATH = "/"
